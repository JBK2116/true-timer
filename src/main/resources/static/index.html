<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicons/favicon.svg">
    <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
    <link rel="mask-icon" href="favicons/safari-pinned-tab.svg" color="#404040">
    <title>QueueTimer</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>QueueTimer</h1>
        <p class="subtitle">Simple assignment time tracking</p>
        <form>
            <div class="form-group">
                <label for="title">Assignment Title</label>
                <input type="text" id="title" name="title" required>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" placeholder="Optional details about the assignment..."></textarea>
            </div>

            <div class="form-group">
                <label>Duration</label>
                <div class="duration-group">
                    <div class="duration-item">
                        <label for="hours">Hours</label>
                        <input type="text" id="hours" name="hours" maxlength="2" value="0" pattern="[0-9]*" inputmode="numeric">
                    </div>
                    <div class="duration-item">
                        <label for="minutes">Minutes</label>
                        <input type="text" id="minutes" name="minutes" maxlength="2" value="30" pattern="[0-9]*" inputmode="numeric">
                    </div>
                </div>
            </div>

            <button type="submit">Start Assignment</button>
        </form>
    </div>

    <!-- Modal for notifications -->
    <div id="modal" class="modal">
        <div id="modal-content" class="modal-content">
            <h3 id="modal-title"></h3>
            <p id="modal-message"></p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
